services:
  - type: web
    name: dashboard-financeiro
    env: docker
    plan: starter
    autoDeploy: true
    disk:
      name: dashboard-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DASHBOARD_DATA_DIR
        value: /var/data
      - key: DASHBOARD_ADMIN_USER
        sync: false
      - key: DASHBOARD_ADMIN_PASSWORD
        sync: false
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
